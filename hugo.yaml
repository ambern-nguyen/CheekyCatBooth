title: "вњҮВё.вЂұВө*ВЁ`*вЂұвњү cheeky cat booth вњүвЂұ*`ВЁ*`вЂұ.ВёвњҮ "
baseURL: 'https://neopost.neocities.org'
languageCode: 'en-us'
titleCaseStyle: 'none' # comment this line for forcing capitalized titles on tags
theme: "neopost"

languages:
  en:
    languageCode: en-us
    contentDir: content/en
    languageName: english
    weight: 1
    params:
      sidebar:
        tags:
          enable: false # default = true?
          limit: 2 # limit showcasing only up to this number of tags in bio, defaults to 5
          more-text: "more tags..." # show a hyperlink with this text if there's more tags than tags-limit

      read-more:
        length-limit: 120 # if the text exceeds this number of characters, the read more button will appear to expand the text
        text:
          more: "read more"
          less: "read less"

permalinks:
  posts: "/posts/:filename/"

taxonomies:
  category: categories

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: next-events
      name: Next Events
      url: /next-events/
      weight: 20
    - identifier: order-online
      name: Order Online
      url: /order-online/
      weight: 30
    - identifier: contact-us
      name: Contact Us
      url: /contact-us/
      weight: 40

params:
  # themes made by neopost: light-blue, dark-blue, light-green, light-yellow, light-pink, light-purple
  # but you can also create your colored theme at "/data/custom_themes.yaml"!
  theme: "meow"
  favicon: "/favicon.ico"
  posts-per-page: 2 # defaults to 5 if not defined
  toc-auto-numbering: false
